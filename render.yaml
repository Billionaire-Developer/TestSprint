services:
  - type: web
    name: quiz-platform-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/quiz.db
      - key: FRONTEND_ORIGIN
        sync: false
    disk:
      name: quiz-data
      mountPath: /var/data
      sizeGB: 1